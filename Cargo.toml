[package]
name = "game"
version = "0.1.0"
edition = "2024"

[dependencies]
sdl3 = "0.18.4"            
ash = "0.38"             
gpu-allocator = "0.28"   
glam = "0.33.1"            


image = "0.25"
fontdue = "0.9"
bytemuck = { version = "1", features = ["derive"] }
crossbeam-queue = "0.3"

anyhow = "1"
log = "0.4"
env_logger = "0.11"

[build-dependencies]
walkdir = "2"

[profile.release]
# Production builds: optimize across the whole crate graph. codegen-units = 1
# trades build time for a faster binary, which is the right call for shipping.
lto = "thin"
codegen-units = 1
