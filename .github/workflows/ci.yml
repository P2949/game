name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            glslc \
            libasound2-dev \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libudev-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            ninja-build \
            pkg-config \
            vulkan-validationlayers \
            wayland-protocols

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --workspace --locked --features game/ci-build-sdl3

      - name: Clippy
        run: cargo clippy --workspace --all-targets --locked --features game/ci-build-sdl3 -- -D warnings

      - name: Release build
        run: cargo build -p game --release --locked --features ci-build-sdl3

  # This path deliberately has no SDL, Vulkan, or audio-device dependencies.
  # It proves the trait-driven Runner can execute a complete content frame with
  # the in-memory backends, complementing (rather than replacing) the lavapipe
  # smoke job below.
  headless-runtime:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Test the backend-neutral runtime loop
        run: cargo test -p game-runtime --test headless_runner --no-default-features --locked

  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --force

      - name: Audit dependencies
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked --force

      - name: Check dependency policy
        run: cargo deny check advisories licenses sources bans

  # Headless runtime smoke test. The binary supports GAME_SMOKE_FRAMES=N,
  # which renders N frames and then exits cleanly through full teardown — so this
  # exercises startup, rendering, swapchain handling, and (with validation layers
  # enabled in a debug build) resource lifetime/teardown checks at Drop. (The
  # validation layers catch many lifetime/teardown mistakes but do not by
  # themselves prove allocator leak-freedom.) This is blocking because it tests
  # real Vulkan startup/render/present/teardown behavior.
  smoke:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Install runtime + software Vulkan
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake glslc ninja-build pkg-config \
            libasound2-dev libdbus-1-dev libegl1-mesa-dev libudev-dev \
            libvulkan-dev libwayland-dev libx11-dev libxcursor-dev libxext-dev \
            libxfixes-dev libxi-dev libxinerama-dev libxkbcommon-dev libxrandr-dev \
            libxss-dev libxtst-dev wayland-protocols \
            mesa-vulkan-drivers vulkan-tools vulkan-validationlayers xvfb
      - name: Build (debug, validation layers on)
        run: cargo build -p game --locked --features ci-build-sdl3
      - name: Select lavapipe Vulkan ICD
        run: |
          lvp_icd="$(find /usr/share/vulkan/icd.d -name 'lvp_icd*.json' -print -quit)"
          if [ -z "$lvp_icd" ]; then
            echo "No lavapipe ICD found in /usr/share/vulkan/icd.d"
            find /usr/share/vulkan/icd.d -maxdepth 1 -type f -print || true
            exit 1
          fi
          echo "Selected lavapipe ICD: $lvp_icd"
          echo "VK_DRIVER_FILES=$lvp_icd" >> "$GITHUB_ENV"
      - name: Check software Vulkan under Xvfb
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          SDL_VIDEODRIVER: x11
        run: xvfb-run -a --server-args="-screen 0 1280x720x24" vulkaninfo --summary
      - name: Render 120 frames headless and exit cleanly
        env:
          GAME_SMOKE_FRAMES: "120"
          LIBGL_ALWAYS_SOFTWARE: "1"
          RUST_LOG: info
          SDL_VIDEODRIVER: x11
        run: timeout -k 5s 120s xvfb-run -a --server-args="-screen 0 1280x720x24" cargo run -p game --locked --features ci-build-sdl3
      # Release smoke test: CI builds release mode but, without running it, an
      # asset-path regression (release does not use the debug source-tree
      # fallback) could survive. Launch the release binary with assets supplied
      # explicitly via GAME_ASSET_DIR, exactly as the README documents.
      - name: Render 120 frames in release mode and exit cleanly
        env:
          GAME_ASSET_DIR: assets
          GAME_SMOKE_FRAMES: "120"
          LIBGL_ALWAYS_SOFTWARE: "1"
          RUST_LOG: info
          SDL_VIDEODRIVER: x11
        run: timeout -k 5s 180s xvfb-run -a --server-args="-screen 0 1280x720x24" cargo run -p game --release --locked --features ci-build-sdl3

  # Minimum-supported-Rust-version gate. Cargo.toml declares rust-version = 1.87
  # (the floor is set by a dependency: sdl3 0.18.4 uses `is_multiple_of`, stable
  # since 1.87). The stable jobs above can silently rely on newer features, so
  # this job pins 1.87.0 and type-checks the crate to prove the declared MSRV is
  # real. Kept to `cargo check` (not full test/clippy) to bound build time.
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.87.0
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            glslc \
            libasound2-dev \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libudev-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            ninja-build \
            pkg-config \
            vulkan-validationlayers \
            wayland-protocols
      - name: Check MSRV (1.87.0)
        run: cargo check --workspace --locked --features game/ci-build-sdl3
