name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            glslc \
            libasound2-dev \
            libdbus-1-dev \
            libegl1-mesa-dev \
            libudev-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxext-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            libxtst-dev \
            ninja-build \
            pkg-config \
            vulkan-validationlayers \
            wayland-protocols

      - name: Format
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --locked --features ci-build-sdl3

      - name: Clippy
        run: cargo clippy --all-targets --locked --features ci-build-sdl3 -- -D warnings

      - name: Release build
        run: cargo build --release --locked --features ci-build-sdl3

  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        run: cargo audit

  # Optional headless runtime smoke test. The binary supports GAME_SMOKE_FRAMES=N,
  # which renders N frames and then exits cleanly through full teardown — so this
  # exercises startup, rendering, swapchain handling, and (with validation layers
  # enabled in a debug build) resource lifetime/teardown checks at Drop. (The
  # validation layers catch many lifetime/teardown mistakes but do not by
  # themselves prove allocator leak-freedom.) It needs a software Vulkan ICD (Mesa
  # lavapipe) plus a virtual display, neither of which is guaranteed stable across
  # runner images, so it is left disabled by default. Enable by removing `if: false`.
  smoke:
    runs-on: ubuntu-latest
    needs: rust
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install runtime + software Vulkan
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake glslc ninja-build pkg-config \
            libasound2-dev libdbus-1-dev libegl1-mesa-dev libudev-dev \
            libvulkan-dev libwayland-dev libx11-dev libxcursor-dev libxext-dev \
            libxfixes-dev libxi-dev libxinerama-dev libxkbcommon-dev libxrandr-dev \
            libxss-dev libxtst-dev wayland-protocols \
            mesa-vulkan-drivers vulkan-tools vulkan-validationlayers xvfb
      - name: Build (debug, validation layers on)
        run: cargo build --locked --features ci-build-sdl3
      - name: Render 120 frames headless and exit cleanly
        env:
          GAME_SMOKE_FRAMES: "120"
          VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.x86_64.json
          LIBGL_ALWAYS_SOFTWARE: "1"
          RUST_LOG: info
        run: xvfb-run -a cargo run --locked --features ci-build-sdl3
