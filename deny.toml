[advisories]
ignore = [
    # `ttf-parser` is pulled in through `fontdue`, which backs the current
    # runtime text rasterizer and packaged font generation path. RUSTSEC-2026-0192
    # marks it unmaintained, but reports no vulnerability or safe upgrade.
    # Track replacement with `skrifa`/fontations as a post-0.2 renderer/API task.
    "RUSTSEC-2026-0192",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[licenses]
confidence-threshold = 0.8
allow = [
    "0BSD",
    "Apache-2.0",
    "BSD-3-Clause",
    "GPL-3.0-or-later",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
